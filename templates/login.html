{% extends "base.html" %}
{% block title %}Login - BSVDA{% endblock %}

{% block content %}

<section style="padding:80px 8%;display:flex;justify-content:center;align-items:center;">

<div style="width:420px;background:#fff;padding:40px;border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,0.08);">

<h2 style="text-align:center;color:var(--primary-blue);margin-bottom:25px;">
Login to BSVDA
</h2>

{% if message %}
<p style="color:red;text-align:center;margin-bottom:15px;">
{{ message }}
</p>
{% endif %}

<form method="POST" action="{{ url_for('login') }}">

<div style="margin-bottom:18px;">
<label style="font-weight:600;">Email</label>
<input 
type="email" 
name="email" 
required
style="width:100%;padding:10px;border-radius:6px;border:1px solid #ccc;margin-top:5px;">
</div>

<div style="margin-bottom:20px;">
<label style="font-weight:600;">Password</label>
<input 
type="password" 
name="password" 
required
style="width:100%;padding:10px;border-radius:6px;border:1px solid #ccc;margin-top:5px;">
</div>

<button 
type="submit"
style="width:100%;padding:12px;background:var(--primary-blue);color:white;border:none;border-radius:8px;font-weight:700;font-size:1rem;cursor:pointer;">
Login
</button>

</form>

<p style="text-align:center;margin-top:20px;">
Don't have an account? 
<a href="{{ url_for('register') }}" style="color:var(--primary-blue);font-weight:600;">
Register
</a>
</p>

</div>
</section>

{% endblock %}
